openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Gym Manager API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: students
    description: Student management
  - name: stats
    description: Dashboard statistics
  - name: payments
    description: Financial payment records
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      description: Returns all registered students
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Register a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Student registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /students/{id}:
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      description: Returns totals for the dashboard stat cards
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GymStats"

  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List all payment records
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Register a new payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/{id}:
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Student:
      type: object
      required: [id, name, plan, enrollmentDate, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        plan:
          type: string
          enum: [Plano Mensal, Plano Trimestral, Plano Anual]
        enrollmentDate:
          type: string
          format: date
        createdAt:
          type: string

    StudentInput:
      type: object
      required: [name, plan, enrollmentDate]
      properties:
        name:
          type: string
          minLength: 1
        plan:
          type: string
          enum: [Plano Mensal, Plano Trimestral, Plano Anual]
        enrollmentDate:
          type: string
          format: date

    Payment:
      type: object
      required: [id, studentId, studentName, amount, paymentDate, status, createdAt]
      properties:
        id:
          type: integer
        studentId:
          type: integer
        studentName:
          type: string
        amount:
          type: number
        paymentDate:
          type: string
          format: date
        status:
          type: string
          enum: [Pago, Atrasado]
        createdAt:
          type: string

    PaymentInput:
      type: object
      required: [studentId, amount, paymentDate, status]
      properties:
        studentId:
          type: integer
        amount:
          type: number
        paymentDate:
          type: string
          format: date
        status:
          type: string
          enum: [Pago, Atrasado]

    GymStats:
      type: object
      required: [totalStudents, activeEnrollments, annualPlans, monthlyRevenue, paidCount, overdueCount]
      properties:
        totalStudents:
          type: integer
        activeEnrollments:
          type: integer
        annualPlans:
          type: integer
        monthlyRevenue:
          type: number
        paidCount:
          type: integer
        overdueCount:
          type: integer

    SuccessResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
