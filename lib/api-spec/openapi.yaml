openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MJ Fitness API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: students
    description: Student management
  - name: stats
    description: Dashboard statistics
  - name: historico
    description: Financial history records
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students with computed status
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Register a new student (auto-creates initial payment entry)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Student registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /students/{id}:
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /students/{id}/renovar:
    post:
      operationId: renewStudent
      tags: [students]
      summary: Renew a student subscription (extends data_vencimento by 1 month and logs payment)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenovarInput"
      responses:
        "200":
          description: Student renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GymStats"

  /historico:
    get:
      operationId: listHistorico
      tags: [historico]
      summary: List all financial history entries
      responses:
        "200":
          description: Financial history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoricoItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Student:
      type: object
      required: [id, name, enrollmentDate, dataVencimento, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        cpf:
          type: string
        telefone:
          type: string
        plano:
          type: string
        formaPagamento:
          type: string
        enrollmentDate:
          type: string
          format: date
        dataVencimento:
          type: string
          format: date
        status:
          type: string
          enum: [Em Dia, Atrasada]
        createdAt:
          type: string

    StudentInput:
      type: object
      required: [name, cpf, telefone, plano, formaPagamento, enrollmentDate]
      properties:
        name:
          type: string
          minLength: 1
        cpf:
          type: string
          minLength: 1
        telefone:
          type: string
          minLength: 1
        plano:
          type: string
          minLength: 1
        formaPagamento:
          type: string
          minLength: 1
        enrollmentDate:
          type: string
          format: date

    RenovarInput:
      type: object
      required: [formaPagamento]
      properties:
        formaPagamento:
          type: string
          minLength: 1

    HistoricoItem:
      type: object
      required: [id, studentId, studentName, amount, paymentDate, createdAt]
      properties:
        id:
          type: integer
        studentId:
          type: integer
        studentName:
          type: string
        amount:
          type: number
        paymentDate:
          type: string
          format: date
        formaPagamento:
          type: string
        createdAt:
          type: string

    GymStats:
      type: object
      required: [totalStudents, activeStudents, overdueStudents, monthlyRevenue]
      properties:
        totalStudents:
          type: integer
        activeStudents:
          type: integer
        overdueStudents:
          type: integer
        monthlyRevenue:
          type: number

    SuccessResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
